name = "unveiled-j6"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "dist/index.js"

# Preserve dashboard / `wrangler secret` plaintext vars that are not listed in [vars].
# Without this, each `wrangler deploy` deletes Stripe/Resend/etc. vars set only in the dashboard.
# Encrypted secrets are never deleted by deploy; this flag protects plaintext vars.
keep_vars = true

# Optional WASM modules (none required for the image pipeline after sip removal).
[[rules]]
globs = ["**/*.wasm"]
type = "CompiledWasm"
fallthrough = true

# Do NOT put credentials in [vars] — they are committed to git and uploaded as
# dashboard Plaintext on every deploy. Set runtime config via:
#   bun run secrets:workers          # from repo-root .env (gitignored)
#   or Cloudflare dashboard → Secrets (preferred for credentials)
# Optional non-secret public config may go in [vars] (e.g. feature flags).

[assets]
directory = "dist"
binding = "ASSETS"

[observability]
enabled = true
